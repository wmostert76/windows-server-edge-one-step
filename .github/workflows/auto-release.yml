name: Auto Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  release:
    if: "!contains(github.event.head_commit.message, '[skip release]')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from script
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="$(grep '^\$ScriptVersion' one-step-install.ps1 | head -n1 | sed 's/.*"\(.*\)".*/\1/')"
          tag="v${version}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.tag }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag $tag already exists — skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag $tag is new — proceeding with release."
          fi

      - name: Build release notes
        if: steps.check.outputs.exists == 'false'
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          file=release_notes.md
          latest_tag="$(git tag -l 'v*' --sort=-v:refname | head -n 1)"
          echo "## Changes" > "$file"
          echo >> "$file"
          if [[ -z "$latest_tag" ]]; then
            echo "- Initial release." >> "$file"
          else
            git log --no-merges --pretty=format:'- %s (%h)' "${latest_tag}..HEAD" >> "$file"
          fi
          echo "file=$file" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          body_path: ${{ steps.notes.outputs.file }}
