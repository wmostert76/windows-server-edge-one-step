name: Auto Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  release:
    if: "!contains(github.event.head_commit.message, '[skip release]')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump patch version in script
        id: version
        shell: bash
        run: |
          set -euo pipefail
          current="$(grep '^\$ScriptVersion' one-step-install.ps1 | head -n1 | sed 's/.*"\(.*\)".*/\1/')"
          IFS='.' read -r major minor patch <<< "$current"
          patch=$((patch + 1))
          new="${major}.${minor}.${patch}"
          sed -i "s/^\(\$ScriptVersion = \"\)${current}\"/\1${new}\"/" one-step-install.ps1
          echo "version=$new" >> "$GITHUB_OUTPUT"
          echo "tag=v${new}" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add one-step-install.ps1
          git commit -m "chore: versie ophogen naar ${{ steps.version.outputs.version }} [skip release]"
          git push origin master

      - name: Build release notes
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.tag }}"
          latest_tag="$(git tag -l 'v*' --sort=-v:refname | head -n 1)"
          file=release_notes.md

          echo "## Wijzigingen in ${tag}" > "$file"
          echo >> "$file"

          if [[ -z "$latest_tag" ]]; then
            echo "- Eerste release." >> "$file"
          else
            git log --no-merges --pretty=format:'- %s (%h)' "${latest_tag}..HEAD" >> "$file"
          fi

          echo "file=$file" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          body_path: ${{ steps.notes.outputs.file }}

      - name: Update CHANGELOG.md
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.tag }}"
          date="$(date -u +%Y-%m-%d)"
          notes_file="${{ steps.notes.outputs.file }}"

          if [[ ! -f CHANGELOG.md ]]; then
            printf '# Changelog\n\nAlle wijzigingen per release worden hier automatisch bijgehouden.\n\n' > CHANGELOG.md
          fi

          tmp="$(mktemp)"
          {
            echo "## ${tag} — ${date}"
            echo
            tail -n +2 "$notes_file"
            echo
            echo
            cat CHANGELOG.md
          } > "$tmp"
          mv "$tmp" CHANGELOG.md

          git add CHANGELOG.md
          git commit -m "docs: changelog bijgewerkt voor ${tag} [skip release]"
          git push origin master
