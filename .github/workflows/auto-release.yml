name: Auto Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  release:
    if: "!contains(github.event.head_commit.message, '[skip release]')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from script
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="$(grep '^\$ScriptVersion' one-step-install.ps1 | head -n1 | sed 's/.*"\(.*\)".*/\1/')"
          tag="v${version}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.tag }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag $tag already exists — skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag $tag is new — proceeding with release."
          fi

      - name: Build release notes
        if: steps.check.outputs.exists == 'false'
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.tag }}"
          latest_tag="$(git tag -l 'v*' --sort=-v:refname | head -n 1)"
          file=release_notes.md

          echo "## Wijzigingen in ${tag}" > "$file"
          echo >> "$file"

          if [[ -z "$latest_tag" ]]; then
            echo "- Eerste release." >> "$file"
          else
            git log --no-merges --pretty=format:'- %s (%h)' "${latest_tag}..HEAD" >> "$file"
          fi

          echo "file=$file" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          body_path: ${{ steps.notes.outputs.file }}

      - name: Update CHANGELOG.md
        if: steps.check.outputs.exists == 'false'
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.tag }}"
          date="$(date -u +%Y-%m-%d)"
          notes_file="${{ steps.notes.outputs.file }}"

          if [[ ! -f CHANGELOG.md ]]; then
            printf '# Changelog\n\nAlle wijzigingen per release worden hier automatisch bijgehouden.\n\n' > CHANGELOG.md
          fi

          tmp="$(mktemp)"
          {
            echo "## ${tag} — ${date}"
            echo
            tail -n +2 "$notes_file"
            echo
            echo
            cat CHANGELOG.md
          } > "$tmp"
          mv "$tmp" CHANGELOG.md

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs: changelog bijgewerkt voor ${tag} [skip release]"
          git push origin master
