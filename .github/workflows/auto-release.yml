name: Auto Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  release:
    if: "!contains(github.event.head_commit.message, '[skip release]')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          latest_tag="$(git tag -l 'v*' --sort=-v:refname | head -n 1)"
          if [[ -n "$latest_tag" ]]; then
            current="${latest_tag#v}"
          else
            current="$(grep '^\$ScriptVersion' one-step-install.ps1 | head -n1 | sed 's/.*"\(.*\)".*/\1/')"
          fi

          IFS='.' read -r major minor patch <<< "$current"
          patch=$((patch + 1))
          new="${major}.${minor}.${patch}"

          echo "version=$new" >> "$GITHUB_OUTPUT"
          echo "tag=v${new}" >> "$GITHUB_OUTPUT"
          echo "previous_tag=$latest_tag" >> "$GITHUB_OUTPUT"

      - name: Prepare release commit and notes
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.tag }}"
          version="${{ steps.version.outputs.version }}"
          previous_tag="${{ steps.version.outputs.previous_tag }}"
          release_sha="${{ github.sha }}"
          notes_file="release_notes.md"

          sed -i "s/^\(\$ScriptVersion = \"\)[^\"]*\"/\1${version}\"/" one-step-install.ps1

          echo "## Wijzigingen in ${tag}" > "$notes_file"
          echo >> "$notes_file"

          if [[ -z "$previous_tag" ]]; then
            echo "- Eerste release." >> "$notes_file"
          else
            git log --no-merges --pretty=format:'- %s (%h)' "${previous_tag}..${release_sha}" >> "$notes_file"
          fi

          date="$(date -u +%Y-%m-%d)"
          if [[ ! -f CHANGELOG.md ]]; then
            printf '# Changelog\n\nAlle wijzigingen per release worden hier automatisch bijgehouden.\n\n' > CHANGELOG.md
          fi

          tmp="$(mktemp)"
          {
            echo "## ${tag} — ${date}"
            echo
            tail -n +2 "$notes_file"
            echo
            echo
            cat CHANGELOG.md
          } > "$tmp"
          mv "$tmp" CHANGELOG.md

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add one-step-install.ps1 CHANGELOG.md
          git commit -m "chore(release): ${tag} [skip release]"
          git push origin master

          echo "file=$notes_file" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          body_path: ${{ steps.notes.outputs.file }}
